<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'">
  <title>NoteBridge</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Title bar (32px, Electron drag region) -->
  <div id="toolbar">
    <span id="app-title">NoteBridge</span>
    <span id="notebook-name"></span>
    <div style="flex:1; -webkit-app-region:no-drag"></div>
    <span id="save-status"></span>
    <div id="toolbar-right">
      <!-- clear-btn kept for app.js compatibility -->
      <button id="clear-btn" class="hidden-btn" title="Clear Canvas">Clear</button>
    </div>
  </div>

  <!-- Ribbon (66px) -->
  <div id="ribbon">

    <!-- File group -->
    <div class="ribbon-group" data-label="File">
      <div class="ribbon-group-body">
        <button id="notebooks-btn" class="win-btn" title="Manage Notebooks">Notebooks</button>
      </div>
    </div>

    <!-- Tools group -->
    <div class="ribbon-group" data-label="Tools">
      <div class="ribbon-group-body" id="tool-selector">
        <div class="ribbon-tool active" data-tool="pen" role="button" tabindex="0" title="Pen (P)">
          <svg width="20" height="20" viewBox="0 0 22 22" fill="none">
            <path d="M15.5 3.5 18.5 6.5 8 17l-3.5.5.5-3.5z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M13 6l3 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
          <span>Pen</span>
        </div>
        <div class="ribbon-tool" data-tool="eraser" role="button" tabindex="0" title="Eraser (E)">
          <svg width="20" height="20" viewBox="0 0 22 22" fill="none">
            <path d="M4 18h14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            <path d="M14 4.5 18 8.5 10 16.5H6l-2-2 8-10z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>Eraser</span>
        </div>
        <div class="ribbon-tool" data-tool="text" role="button" tabindex="0" title="Text (T)">
          <svg width="20" height="20" viewBox="0 0 22 22" fill="none">
            <path d="M5 6h12M11 6v11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M7.5 17h7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <span>Text</span>
        </div>
      </div>
    </div>

    <!-- Colors group -->
    <div class="ribbon-group" data-label="Colors">
      <div class="ribbon-group-body">
        <div id="color-palette"></div>
      </div>
    </div>

    <!-- Size group -->
    <div class="ribbon-group" data-label="Size">
      <div class="ribbon-group-body">
        <div id="size-selector"></div>
      </div>
    </div>

    <!-- Edit group -->
    <div class="ribbon-group" data-label="Edit">
      <div class="ribbon-group-body">
        <div class="ribbon-tool" id="undo-btn" role="button" tabindex="0" title="Undo (Ctrl+Z)">
          <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
            <path d="M3.5 8C5.5 5 9.5 3 13.5 5 17.5 7 18 12.5 15.5 16" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            <path d="M3.5 4v4h4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>Undo</span>
        </div>
        <div class="ribbon-tool ribbon-tool-dim" id="redo-btn" role="button" tabindex="0" title="Redo (Ctrl+Y)">
          <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
            <path d="M16.5 8C14.5 5 10.5 3 6.5 5 2.5 7 2 12.5 4.5 16" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            <path d="M16.5 4v4h-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>Redo</span>
        </div>
      </div>
    </div>

    <!-- Insert group -->
    <div class="ribbon-group" data-label="Insert">
      <div class="ribbon-group-body">
        <div class="ribbon-stacked">
          <button id="insert-image-btn" class="win-btn win-btn-sm" title="Insert Image (Ctrl+I)">🖼&thinsp; Image</button>
          <button id="export-pdf-btn" class="win-btn win-btn-sm" title="Export PDF">⬇&thinsp; Export PDF</button>
        </div>
      </div>
    </div>

    <!-- Spacer -->
    <div class="ribbon-spacer"></div>

    <!-- Connection group -->
    <div class="ribbon-group ribbon-group-right" data-label="Connection">
      <div class="ribbon-group-body">
        <div id="connection-status" class="conn-disconnected">
          <div class="conn-dot"></div>
          <div class="conn-text">
            <div class="conn-name">Not Connected</div>
            <div class="conn-hint">No iPad connected</div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- Canvas container -->
  <div id="canvas-container">
    <canvas id="canvas"></canvas>
  </div>

  <!-- Page bar (32px) -->
  <div id="page-bar">
    <button id="prev-page-btn" class="page-btn" title="Previous Page (←)">← Prev</button>
    <span id="page-indicator">Page 1 / 1</span>
    <button id="next-page-btn" class="page-btn" title="Next Page (→)">Next →</button>
    <div class="page-bar-div"></div>
    <button id="pages-btn" class="page-btn" title="View all pages">&#9633;&thinsp; Pages</button>
    <div class="page-bar-thin-div"></div>
    <button id="add-page-btn" class="page-btn page-btn-accent" title="Add page">+ Add Page</button>
    <!-- dropdown btn kept for app.js compatibility -->
    <button id="add-page-dropdown-btn" class="hidden-btn" title="Add page with custom template">▾</button>
    <div class="page-bar-spacer"></div>
    <span id="page-bar-save"></span>
  </div>

  <!-- Status bar (22px) -->
  <div id="status-bar">
    <span id="status-notebooks">—</span>
    <div class="status-div"></div>
    <span id="status-sync">All synced</span>
    <div style="flex:1"></div>
    <div id="status-connection">
      <div class="status-dot"></div>
      <span id="status-conn-label">Not connected to iPad</span>
    </div>
  </div>

  <!-- Notebook management modal -->
  <div id="notebook-modal-overlay" class="modal-overlay hidden">
    <div class="modal notebook-modal">
      <div class="modal-titlebar">
        <span class="modal-title">Notebooks</span>
        <div style="flex:1"></div>
        <button id="notebook-new-btn" class="win-btn win-btn-accent">+ New Notebook</button>
        <div class="modal-title-div"></div>
        <button id="notebook-modal-close" class="win-btn win-btn-sm">✕</button>
      </div>
      <div class="modal-toolbar">
        <div id="nb-view-toggle" class="view-toggle">
          <button class="view-toggle-btn active" data-view="grid">⊞ Grid</button>
          <button class="view-toggle-btn" data-view="list">≡ List</button>
        </div>
        <div class="modal-div"></div>
        <div class="nb-search">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <circle cx="5" cy="5" r="3.5" stroke="currentColor" stroke-width="1.3"/>
            <path d="M8 8l2 2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
          <span>Search notebooks…</span>
        </div>
      </div>
      <div class="modal-body">
        <div id="notebook-list-grid" class="notebook-grid"></div>
      </div>
      <div id="nb-status-bar" class="nb-status-bar">
        <span id="nb-count">—</span>
      </div>
    </div>
  </div>

  <!-- Pages overview modal -->
  <div id="pages-overview-overlay" class="modal-overlay hidden">
    <div class="modal pages-overview-modal">
      <div class="modal-titlebar">
        <span class="modal-title">Pages</span>
        <div style="flex:1"></div>
        <button id="pages-add-btn" class="win-btn win-btn-accent">+ Add Page</button>
        <div class="modal-title-div"></div>
        <button id="pages-overview-close" class="win-btn win-btn-sm">✕</button>
      </div>
      <div class="modal-body pages-overview-body">
        <div id="pages-grid" class="pages-grid"></div>
      </div>
    </div>
  </div>

  <!-- Page setup modal (size + template) -->
  <div id="page-setup-overlay" class="modal-overlay hidden">
    <div class="modal page-setup-modal">
      <div class="modal-titlebar">
        <span id="page-setup-title" class="modal-title">New Notebook</span>
        <div style="flex:1"></div>
        <button id="page-setup-close-btn" class="win-btn win-btn-sm">✕</button>
      </div>
      <div class="modal-body">
        <div id="page-setup-name-row" class="ps-field-row">
          <label class="ps-label">Name</label>
          <input id="page-setup-name" type="text" class="notebook-new-input" placeholder="Notebook name…">
        </div>
        <div class="ps-field-row">
          <label class="ps-label">Page Size</label>
          <div class="ps-size-grid">
            <button class="ps-size-btn active" data-size="a4-landscape">
              <span class="ps-size-icon ps-landscape"></span>A4 Landscape
            </button>
            <button class="ps-size-btn" data-size="a4-portrait">
              <span class="ps-size-icon ps-portrait"></span>A4 Portrait
            </button>
            <button class="ps-size-btn" data-size="letter-landscape">
              <span class="ps-size-icon ps-landscape"></span>Letter Landscape
            </button>
            <button class="ps-size-btn" data-size="letter-portrait">
              <span class="ps-size-icon ps-portrait"></span>Letter Portrait
            </button>
            <button class="ps-size-btn" data-size="square">
              <span class="ps-size-icon ps-square"></span>Square
            </button>
          </div>
        </div>
        <div class="ps-field-row">
          <label class="ps-label">Template</label>
          <div class="ps-template-grid">
            <button class="ps-template-btn active" data-template="blank">Blank</button>
            <button class="ps-template-btn" data-template="dotted">Dotted</button>
            <button class="ps-template-btn" data-template="squared">Squared</button>
            <button class="ps-template-btn" data-template="ruled-narrow">Ruled</button>
            <button class="ps-template-btn" data-template="cornell">Cornell</button>
            <button class="ps-template-btn" data-template="three-column">3 Column</button>
          </div>
        </div>
        <div class="ps-actions">
          <button id="page-setup-cancel" class="win-btn">Cancel</button>
          <button id="page-setup-confirm" class="win-btn win-btn-accent">Create</button>
        </div>
      </div>
    </div>
  </div>

  <script src="history.js"></script>
  <script src="tools.js"></script>
  <script src="canvas.js"></script>
  <script src="notebook.js"></script>
  <script src="notebook-list.js"></script>
  <script src="page-setup.js"></script>
  <script src="pages-overview.js"></script>
  <script src="app.js"></script>
</body>
</html>
