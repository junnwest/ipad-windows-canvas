<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>NoteBridge</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">

    <div id="canvas-area">
      <canvas id="drawing-canvas"></canvas>
      <canvas id="cursor-canvas"></canvas>
    </div>

    <div id="toolbar">

      <div class="tool-group">
        <button class="tool-btn active" id="tool-pen" data-tool="pen" aria-label="Pen">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9"/>
            <path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
          </svg>
        </button>
        <button class="tool-btn" id="tool-eraser" data-tool="eraser" aria-label="Eraser">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 20H7L3 16l11.5-11.5a2 2 0 012.83 0l3.17 3.17a2 2 0 010 2.83L8 20"/>
            <path d="M6 17l3-3"/>
          </svg>
        </button>
      </div>

      <div class="tool-group colors">
        <button class="color-btn active" data-color="#1a1a1a" style="--color:#1a1a1a" aria-label="Black"></button>
        <button class="color-btn" data-color="#e53935" style="--color:#e53935" aria-label="Red"></button>
        <button class="color-btn" data-color="#1e88e5" style="--color:#1e88e5" aria-label="Blue"></button>
        <button class="color-btn" data-color="#43a047" style="--color:#43a047" aria-label="Green"></button>
        <button class="color-btn" data-color="#fb8c00" style="--color:#fb8c00" aria-label="Orange"></button>
      </div>

      <div class="tool-group sizes">
        <button class="size-btn active" data-size="2" aria-label="Thin"><span class="size-dot" style="width:4px;height:4px"></span></button>
        <button class="size-btn" data-size="5" aria-label="Medium"><span class="size-dot" style="width:9px;height:9px"></span></button>
        <button class="size-btn" data-size="10" aria-label="Thick"><span class="size-dot" style="width:16px;height:16px"></span></button>
      </div>

      <div class="tool-group actions">
        <button class="action-btn" id="btn-undo" aria-label="Undo">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 14 4 9 9 4"/>
            <path d="M20 20v-7a4 4 0 00-4-4H4"/>
          </svg>
        </button>
        <button class="action-btn" id="btn-redo" aria-label="Redo">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 14 20 9 15 4"/>
            <path d="M4 20v-7a4 4 0 014-4h12"/>
          </svg>
        </button>
      </div>

      <div class="tool-group pages">
        <button class="action-btn" id="btn-prev" aria-label="Previous page">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <span id="page-indicator">1 / 1</span>
        <button class="action-btn" id="btn-next" aria-label="Next page">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
        <button class="action-btn" id="btn-add-page" aria-label="Add page">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>

    </div>
  </div>

  <script src="canvas.js"></script>
  <script src="app.js"></script>
</body>
</html>
